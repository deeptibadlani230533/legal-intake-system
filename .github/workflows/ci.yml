name: Legal Intake CI

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest


steps:
  - name: Checkout Repository
    uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install Frontend Dependencies
    run: |
      cd "Legal app with react/legal-app"
      npm install

  - name: Build Frontend
    run: |
      cd "Legal app with react/legal-app"
      npm run build

  - name: Install Backend Dependencies
    run: |
      cd legal-intake-backend
      npm install

