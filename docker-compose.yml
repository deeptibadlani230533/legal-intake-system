version: "3.9"

services:
  frontend:
    build:
      context: ./Legal app with react/legal-app
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://13.233.254.150:3000
    depends_on:
      - backend

  backend:
    build: ./legal-intake-backend
    ports:
      - "3000:3000"
    env_file:
      - ./legal-intake-backend/.env
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: root
      DB_NAME: legal_intake_db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: legal_intake_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: